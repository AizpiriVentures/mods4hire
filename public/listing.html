<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Job — Mods4Hire</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/src/css/styles.css" />
</head>
<body class="bg-gray-50 min-h-screen">
  <nav class="bg-white border-b border-gray-200 sticky top-0 z-50">
    <div class="max-w-6xl mx-auto px-4">
      <div class="flex items-center justify-between h-14">
        <a href="/" class="text-xl font-bold text-sky-600 shrink-0">Mods4Hire</a>
        <div class="hidden md:flex items-center gap-6">
          <a href="/listings.html" class="text-sm text-gray-600 hover:text-sky-600 transition-colors">Browse Listings</a>
          <a href="/moderators.html" class="text-sm text-gray-600 hover:text-sky-600 transition-colors">Moderators</a>
        </div>
        <div class="hidden md:flex items-center gap-6">
          <div id="auth-links" class="flex items-center gap-6"><a href="/login.html" class="text-sm text-gray-600 hover:text-sky-600 transition-colors">Log In</a><a href="/login.html#register" class="text-sm text-gray-600 hover:text-sky-600 transition-colors">Sign Up</a></div>
          <a href="/listings-new.html" class="bg-sky-600 hover:bg-sky-700 text-white text-sm px-4 py-2 rounded-lg font-medium transition-colors">Create a Listing</a>
        </div>
      </div>
    </div>
  </nav>
  <main class="max-w-3xl mx-auto px-4 py-10">
    <div id="listing-detail"><p class="text-gray-400">Loading…</p></div>

    <!-- Apply section (visible to non-hirers) -->
    <div id="apply-section" class="mt-8 hidden">
      <h2 class="text-lg font-semibold text-gray-800 mb-3">Apply</h2>
      <textarea id="pitch" rows="4" maxlength="1000" placeholder="Tell the hirer about your moderation experience…"
        class="w-full border border-gray-300 rounded-xl px-4 py-3 text-sm resize-none focus:outline-none focus:ring-2 focus:ring-sky-400"></textarea>
      <button id="apply-btn" class="mt-3 bg-sky-600 hover:bg-sky-700 text-white px-6 py-2 rounded-lg font-medium transition">Apply</button>
      <p id="apply-error" class="text-red-500 text-sm mt-2 hidden"></p>
    </div>

    <!-- Applicants section (visible to the hirer only) -->
    <div id="applicants-section" class="mt-10 hidden">
      <h2 class="text-lg font-semibold text-gray-800 mb-4">Applicants</h2>
      <div id="applicants-list"><p class="text-gray-400 text-sm">Loading applicants…</p></div>
    </div>
  </main>
  <script>
  document.getElementById('menu-btn')?.addEventListener('click', () => {
    document.getElementById('mobile-menu').classList.toggle('hidden');
  });
</script>
  <script type="module">
    import { getListing } from '/src/js/listings.js';
    import { applyToListing } from '/src/js/applications.js';
    import { getUser, updateNavAuth } from '/src/js/auth.js';
    import { supabase, escapeHtml, showToast, setLoading } from '/src/js/supabase.js';

    updateNavAuth();
    const id = new URLSearchParams(location.search).get('id');
    if (!id) window.location.href = '/listings.html';

    const [listing, user] = await Promise.all([getListing(id), getUser()]);
    document.title = `${listing.title} — Mods4Hire`;
    document.getElementById('listing-detail').innerHTML = `
      <a href="/listings.html" class="text-sky-600 text-sm hover:underline">← Back</a>
      <h1 class="text-3xl font-bold text-gray-900 mt-4 mb-2">${escapeHtml(listing.title)}</h1>
      <div class="flex flex-wrap gap-2 mb-4">
        ${(listing.platform||[]).map(p=>`<span class="text-xs bg-sky-50 text-sky-700 px-2 py-1 rounded">${escapeHtml(p)}</span>`).join('')}
      </div>
      <div class="bg-white rounded-xl border border-gray-200 p-5 space-y-2 text-sm">
        <p><span class="text-gray-400">Compensation:</span> ${escapeHtml(listing.compensation_type)}</p>
        ${listing.hours_per_week ? `<p><span class="text-gray-400">Hours/week:</span> ${listing.hours_per_week}</p>` : ''}
        ${listing.community_type ? `<p><span class="text-gray-400">Community type:</span> ${escapeHtml(listing.community_type)}</p>` : ''}
        ${listing.required_skills ? `<p><span class="text-gray-400">Required skills:</span> ${escapeHtml(listing.required_skills)}</p>` : ''}
        ${listing.deadline ? `<p><span class="text-gray-400">Deadline:</span> ${new Date(listing.deadline).toLocaleDateString()}</p>` : ''}
        <p><span class="text-gray-400">Posted by:</span> ${escapeHtml(listing.profiles?.username)}${user && user.id !== listing.hirer_id ? ` <a href="/rate.html?ratee=${listing.hirer_id}" class="ml-2 text-xs text-yellow-600 border border-yellow-300 px-2 py-0.5 rounded hover:bg-yellow-50">⭐ Rate</a>` : ''}</p>
      </div>
    `;
    if (user && user.id === listing.hirer_id) {
      // ── Hirer view: add edit button to listing detail ───────────────────
      const detailEl = document.getElementById('listing-detail');
      const editBtn = document.createElement('a');
      editBtn.href = `/listings-edit.html?id=${id}`;
      editBtn.className = 'inline-block mt-4 text-sm text-sky-600 border border-sky-300 hover:bg-sky-50 px-4 py-1.5 rounded-lg transition-colors';
      editBtn.textContent = 'Edit Listing';
      detailEl.appendChild(editBtn);

      // ── Hirer view: show applicants ─────────────────────────────────────
      document.getElementById('applicants-section').classList.remove('hidden');

      const { data: apps, error: appsErr } = await supabase
        .from('applications')
        .select('id, pitch, status, applied_at, profiles:applicant_id(id, username, rating_avg, rating_count)')
        .eq('listing_id', id)
        .order('applied_at', { ascending: true });

      const listEl = document.getElementById('applicants-list');
      if (appsErr || !apps?.length) {
        listEl.innerHTML = '<p class="text-gray-400 text-sm">No applicants yet.</p>';
      } else {
        listEl.innerHTML = '';
        apps.forEach(app => {
          const STATUS_BADGE = {
            pending:  'bg-yellow-50 text-yellow-700',
            accepted: 'bg-green-50 text-green-700',
            rejected: 'bg-gray-100 text-gray-500',
          };
          const div = document.createElement('div');
          div.id = `app-${app.id}`;
          div.className = 'bg-white border border-gray-200 rounded-xl p-5 mb-3';
          div.innerHTML = `
            <div class="flex items-start justify-between gap-3 mb-3">
              <div>
                <a href="/moderator.html?id=${app.profiles?.id}" class="font-semibold text-gray-900 hover:text-sky-600">${escapeHtml(app.profiles?.username || '—')}</a>
                ${app.profiles?.rating_count > 0 ? `<span class="ml-2 text-yellow-500 text-sm">⭐ ${Number(app.profiles.rating_avg).toFixed(1)} <span class="text-gray-400 text-xs">(${app.profiles.rating_count})</span></span>` : '<span class="ml-2 text-xs text-gray-400">No ratings yet</span>'}
              </div>
              <span class="text-xs px-2 py-0.5 rounded-full shrink-0 ${STATUS_BADGE[app.status] || ''}">${app.status}</span>
            </div>
            ${app.pitch ? `<p class="text-sm text-gray-600 leading-relaxed mb-4">${escapeHtml(app.pitch)}</p>` : '<p class="text-gray-400 text-sm italic mb-4">No pitch provided.</p>'}
            <div class="flex gap-2 flex-wrap">
              <button data-appid="${app.id}" data-action="accepted"
                class="action-btn text-xs px-3 py-1.5 rounded-lg border ${app.status === 'accepted' ? 'bg-green-600 text-white border-green-600' : 'border-green-300 text-green-700 hover:bg-green-50'} transition-colors">
                Accept
              </button>
              <button data-appid="${app.id}" data-action="rejected"
                class="action-btn text-xs px-3 py-1.5 rounded-lg border ${app.status === 'rejected' ? 'bg-gray-400 text-white border-gray-400' : 'border-gray-300 text-gray-500 hover:bg-gray-100'} transition-colors">
                Reject
              </button>
            </div>
          `;
          listEl.appendChild(div);
        });

        listEl.addEventListener('click', async e => {
          const btn = e.target.closest('.action-btn');
          if (!btn) return;
          const appId = btn.dataset.appid;
          const action = btn.dataset.action;
          btn.disabled = true;
          try {
            const { updateApplicationStatus } = await import('/src/js/applications.js');
            await updateApplicationStatus(appId, action);
            // Refresh just this card's buttons/badge
            const card = document.getElementById(`app-${appId}`);
            const STATUS_BADGE = { pending: 'bg-yellow-50 text-yellow-700', accepted: 'bg-green-50 text-green-700', rejected: 'bg-gray-100 text-gray-500' };
            card.querySelector('span.rounded-full').className = `text-xs px-2 py-0.5 rounded-full shrink-0 ${STATUS_BADGE[action] || ''}`;
            card.querySelector('span.rounded-full').textContent = action;
            card.querySelectorAll('.action-btn').forEach(b => {
              const isActive = b.dataset.action === action;
              b.className = `action-btn text-xs px-3 py-1.5 rounded-lg border ${
                isActive
                  ? (action === 'accepted' ? 'bg-green-600 text-white border-green-600' : 'bg-gray-400 text-white border-gray-400')
                  : (b.dataset.action === 'accepted' ? 'border-green-300 text-green-700 hover:bg-green-50' : 'border-gray-300 text-gray-500 hover:bg-gray-100')
              } transition-colors`;
              b.disabled = false;
            });
          } catch (ex) {
            alert(ex.message);
            btn.disabled = false;
          }
        });
      }
    } else if (user && user.id !== listing.hirer_id) {
      // ── Applicant view: show apply form ─────────────────────────────────
      document.getElementById('apply-section').classList.remove('hidden');
      document.getElementById('apply-btn').addEventListener('click', async () => {
        const btn = document.getElementById('apply-btn');
        const err = document.getElementById('apply-error');
        err.classList.add('hidden'); setLoading(btn, true);
        try { await applyToListing(id, document.getElementById('pitch').value); showToast('Application submitted!'); document.getElementById('apply-section').innerHTML = '<p class="text-green-600 font-medium">✓ Application submitted</p>'; }
        catch (ex) { err.textContent = ex.message; err.classList.remove('hidden'); }
        finally { setLoading(btn, false); }
      });
    }
  </script>
</body>
</html>
