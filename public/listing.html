<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Job — Mods4Hire</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/src/css/styles.css" />
</head>
<body class="bg-gray-50 min-h-screen">
  <nav class="bg-white border-b border-gray-200 sticky top-0 z-50">
    <div class="max-w-6xl mx-auto px-4 py-3 flex items-center justify-between">
      <a href="/" class="text-xl font-bold text-sky-600">Mods4Hire</a>
      <div id="auth-links" class="flex items-center gap-4"></div>
    </div>
  </nav>
  <main class="max-w-3xl mx-auto px-4 py-10">
    <div id="listing-detail"><p class="text-gray-400">Loading…</p></div>
    <div id="apply-section" class="mt-8 hidden">
      <h2 class="text-lg font-semibold text-gray-800 mb-3">Apply</h2>
      <textarea id="pitch" rows="4" maxlength="1000" placeholder="Tell the hirer about your moderation experience…"
        class="w-full border border-gray-300 rounded-xl px-4 py-3 text-sm resize-none focus:outline-none focus:ring-2 focus:ring-sky-400"></textarea>
      <button id="apply-btn" class="mt-3 bg-sky-600 hover:bg-sky-700 text-white px-6 py-2 rounded-lg font-medium transition">Apply</button>
      <p id="apply-error" class="text-red-500 text-sm mt-2 hidden"></p>
    </div>
  </main>
  <script>
  document.getElementById('menu-btn')?.addEventListener('click', () => {
    document.getElementById('mobile-menu').classList.toggle('hidden');
  });
</script>
  <script type="module">
    import { getListing } from '/src/js/listings.js';
    import { applyToListing } from '/src/js/applications.js';
    import { getUser, updateNavAuth } from '/src/js/auth.js';
    import { escapeHtml, showToast, setLoading } from '/src/js/supabase.js';

    updateNavAuth();
    const id = new URLSearchParams(location.search).get('id');
    if (!id) window.location.href = '/listings.html';

    const [listing, user] = await Promise.all([getListing(id), getUser()]);
    document.title = `${listing.title} — Mods4Hire`;
    document.getElementById('listing-detail').innerHTML = `
      <a href="/listings.html" class="text-sky-600 text-sm hover:underline">← Back</a>
      <h1 class="text-3xl font-bold text-gray-900 mt-4 mb-2">${escapeHtml(listing.title)}</h1>
      <div class="flex flex-wrap gap-2 mb-4">
        ${(listing.platform||[]).map(p=>`<span class="text-xs bg-sky-50 text-sky-700 px-2 py-1 rounded">${escapeHtml(p)}</span>`).join('')}
      </div>
      <div class="bg-white rounded-xl border border-gray-200 p-5 space-y-2 text-sm">
        <p><span class="text-gray-400">Compensation:</span> ${escapeHtml(listing.compensation_type)}</p>
        ${listing.hours_per_week ? `<p><span class="text-gray-400">Hours/week:</span> ${listing.hours_per_week}</p>` : ''}
        ${listing.community_type ? `<p><span class="text-gray-400">Community type:</span> ${escapeHtml(listing.community_type)}</p>` : ''}
        ${listing.required_skills ? `<p><span class="text-gray-400">Required skills:</span> ${escapeHtml(listing.required_skills)}</p>` : ''}
        ${listing.deadline ? `<p><span class="text-gray-400">Deadline:</span> ${new Date(listing.deadline).toLocaleDateString()}</p>` : ''}
        <p><span class="text-gray-400">Posted by:</span> ${escapeHtml(listing.profiles?.username)}</p>
      </div>
    `;
    if (user && user.id !== listing.hirer_id) {
      document.getElementById('apply-section').classList.remove('hidden');
      document.getElementById('apply-btn').addEventListener('click', async () => {
        const btn = document.getElementById('apply-btn');
        const err = document.getElementById('apply-error');
        err.classList.add('hidden'); setLoading(btn, true);
        try { await applyToListing(id, document.getElementById('pitch').value); showToast('Application submitted!'); document.getElementById('apply-section').innerHTML = '<p class="text-green-600 font-medium">✓ Application submitted</p>'; }
        catch (ex) { err.textContent = ex.message; err.classList.remove('hidden'); }
        finally { setLoading(btn, false); }
      });
    }
  </script>
</body>
</html>
