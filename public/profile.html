<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Profile — Mods4Hire</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/src/css/styles.css" />
</head>
<body class="bg-gray-50 min-h-screen">

  <nav class="bg-white border-b border-gray-200 sticky top-0 z-50">
    <div class="max-w-6xl mx-auto px-4">
      <div class="flex items-center justify-between h-14">
        <a href="/" class="text-xl font-bold text-sky-600 shrink-0">Mods4Hire</a>
        <div class="hidden md:flex items-center gap-6">
          <a href="/listings.html" class="text-sm text-gray-600 hover:text-sky-600 transition-colors">Browse Listings</a>
          <a href="/moderators.html" class="text-sm text-gray-600 hover:text-sky-600 transition-colors">Moderators</a>
        </div>
        <div class="hidden md:flex items-center gap-6">
          <div id="auth-links" class="flex items-center gap-6"></div>
          <a href="/listings-new.html" class="bg-sky-600 hover:bg-sky-700 text-white text-sm px-4 py-2 rounded-lg font-medium transition-colors">Create a Listing</a>
        </div>
        <div class="flex md:hidden items-center gap-2">
          <a href="/listings-new.html" class="bg-sky-600 text-white text-xs px-3 py-1.5 rounded-lg font-medium">Post</a>
          <button id="menu-btn" aria-label="Open menu" class="p-2 rounded-lg text-gray-600 hover:bg-gray-100">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/></svg>
          </button>
        </div>
      </div>
      <div id="mobile-menu" class="hidden md:hidden border-t border-gray-100 py-3 space-y-0.5 pb-4">
        <a href="/listings.html" class="block px-3 py-2.5 text-sm text-gray-700 hover:text-sky-600 hover:bg-gray-50 rounded-lg">Browse Listings</a>
        <a href="/moderators.html" class="block px-3 py-2.5 text-sm text-gray-700 hover:text-sky-600 hover:bg-gray-50 rounded-lg">Moderators</a>
        <div id="mobile-auth-links" class="pt-2 border-t border-gray-100 mt-2"></div>
      </div>
    </div>
  </nav>

  <main class="max-w-2xl mx-auto px-4 py-10">
    <h1 class="text-2xl font-bold text-gray-900 mb-8">My Profile</h1>

    <form id="profile-form" class="space-y-5">

      <!-- Username (read-only) -->
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Username</label>
        <input id="username" type="text" readonly
          class="w-full border border-gray-200 bg-gray-50 rounded-lg px-4 py-2 text-sm text-gray-400 cursor-not-allowed" />
        <p class="text-xs text-gray-400 mt-1">Username cannot be changed.</p>
      </div>

      <!-- Bio -->
      <div>
        <div class="flex justify-between mb-1">
          <label class="block text-sm font-medium text-gray-700">Bio</label>
          <span id="bio-count" class="text-xs text-gray-400">0 / 500</span>
        </div>
        <textarea id="bio" rows="3" maxlength="500" placeholder="Tell hirers and moderators a bit about yourself…"
          class="w-full border border-gray-300 rounded-lg px-4 py-2 text-sm resize-none focus:outline-none focus:ring-2 focus:ring-sky-400"></textarea>
      </div>

      <!-- Role -->
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">I am a…</label>
        <select id="role" class="w-full border border-gray-300 rounded-lg px-4 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-sky-400">
          <option value="both">Hirer &amp; Moderator</option>
          <option value="hirer">Hirer — I post listings and hire moderators</option>
          <option value="moderator">Moderator — I apply to listings</option>
        </select>
      </div>

      <!-- Moderator details (shown when role is moderator or both) -->
      <div id="mod-section" class="hidden border border-gray-200 rounded-xl p-5 space-y-4 bg-white">
        <h2 class="text-sm font-semibold text-gray-700">Moderator Details</h2>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-2">Platforms I moderate</label>
          <div class="flex flex-wrap gap-3">
            <label class="flex items-center gap-1.5 text-sm"><input type="checkbox" name="platform" value="Discord" class="rounded" /> Discord</label>
            <label class="flex items-center gap-1.5 text-sm"><input type="checkbox" name="platform" value="TeamSpeak" class="rounded" /> TeamSpeak</label>
            <label class="flex items-center gap-1.5 text-sm"><input type="checkbox" name="platform" value="Reddit" class="rounded" /> Reddit</label>
            <label class="flex items-center gap-1.5 text-sm"><input type="checkbox" name="platform" value="Twitch" class="rounded" /> Twitch</label>
            <label class="flex items-center gap-1.5 text-sm"><input type="checkbox" name="platform" value="Kick" class="rounded" /> Kick</label>
            <label class="flex items-center gap-1.5 text-sm"><input type="checkbox" name="platform" value="YouTube" class="rounded" /> YouTube</label>
            <label class="flex items-center gap-1.5 text-sm"><input type="checkbox" name="platform" value="Games" class="rounded" /> Game Servers</label>
            <label class="flex items-center gap-1.5 text-sm"><input type="checkbox" name="platform" value="Forum" class="rounded" /> Forums</label>
            <label class="flex items-center gap-1.5 text-sm"><input type="checkbox" name="platform" value="Other" class="rounded" /> Other</label>
          </div>
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Availability (hours/week)</label>
          <input id="hours_per_week" type="number" min="1" max="168" placeholder="e.g. 10"
            class="w-full border border-gray-300 rounded-lg px-4 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-sky-400" />
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Portfolio / Resume URL <span class="text-gray-400 font-normal">(optional)</span></label>
          <input id="portfolio_url" type="url" maxlength="255" placeholder="https://…"
            class="w-full border border-gray-300 rounded-lg px-4 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-sky-400" />
        </div>
      </div>

      <!-- Gaming Background -->
      <div class="border border-gray-200 rounded-xl p-5 space-y-4 bg-white">
        <h2 class="text-sm font-semibold text-gray-700">Gaming Background <span class="text-gray-400 font-normal">(optional)</span></h2>

        <div class="grid grid-cols-2 gap-4">
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Gaming since (year)</label>
            <input id="gaming_since_year" type="number" min="1970" max="2030" placeholder="e.g. 2005"
              class="w-full border border-gray-300 rounded-lg px-4 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-sky-400" />
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Hours/week gaming</label>
            <input id="gaming_hours_week" type="number" min="0" max="168" placeholder="e.g. 15"
              class="w-full border border-gray-300 rounded-lg px-4 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-sky-400" />
          </div>
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-2">Gaming style</label>
          <select id="gaming_style" class="w-full border border-gray-300 rounded-lg px-4 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-sky-400">
            <option value="">Select...</option>
            <option value="casual">Casual gamer</option>
            <option value="competitive">Competitive / hardcore</option>
            <option value="content_creator">Content creator</option>
            <option value="streamer">Streamer</option>
            <option value="collector">Collector</option>
            <option value="speedrunner">Speedrunner</option>
          </select>
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-2">Favorite genres</label>
          <div class="flex flex-wrap gap-3">
            <label class="flex items-center gap-1.5 text-sm"><input type="checkbox" name="genre" value="FPS" class="rounded" /> FPS</label>
            <label class="flex items-center gap-1.5 text-sm"><input type="checkbox" name="genre" value="RPG" class="rounded" /> RPG</label>
            <label class="flex items-center gap-1.5 text-sm"><input type="checkbox" name="genre" value="MMORPG" class="rounded" /> MMORPG</label>
            <label class="flex items-center gap-1.5 text-sm"><input type="checkbox" name="genre" value="Strategy" class="rounded" /> Strategy</label>
            <label class="flex items-center gap-1.5 text-sm"><input type="checkbox" name="genre" value="MOBA" class="rounded" /> MOBA</label>
            <label class="flex items-center gap-1.5 text-sm"><input type="checkbox" name="genre" value="Battle Royale" class="rounded" /> Battle Royale</label>
            <label class="flex items-center gap-1.5 text-sm"><input type="checkbox" name="genre" value="Sports" class="rounded" /> Sports</label>
            <label class="flex items-center gap-1.5 text-sm"><input type="checkbox" name="genre" value="Simulation" class="rounded" /> Simulation</label>
            <label class="flex items-center gap-1.5 text-sm"><input type="checkbox" name="genre" value="Indie" class="rounded" /> Indie</label>
            <label class="flex items-center gap-1.5 text-sm"><input type="checkbox" name="genre" value="Horror" class="rounded" /> Horror</label>
            <label class="flex items-center gap-1.5 text-sm"><input type="checkbox" name="genre" value="Adventure" class="rounded" /> Adventure</label>
            <label class="flex items-center gap-1.5 text-sm"><input type="checkbox" name="genre" value="Puzzle" class="rounded" /> Puzzle</label>
          </div>
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-2">Preferred platforms</label>
          <div class="flex flex-wrap gap-3">
            <label class="flex items-center gap-1.5 text-sm"><input type="checkbox" name="game_platform" value="PC" class="rounded" /> PC</label>
            <label class="flex items-center gap-1.5 text-sm"><input type="checkbox" name="game_platform" value="PlayStation" class="rounded" /> PlayStation</label>
            <label class="flex items-center gap-1.5 text-sm"><input type="checkbox" name="game_platform" value="Xbox" class="rounded" /> Xbox</label>
            <label class="flex items-center gap-1.5 text-sm"><input type="checkbox" name="game_platform" value="Nintendo Switch" class="rounded" /> Nintendo Switch</label>
            <label class="flex items-center gap-1.5 text-sm"><input type="checkbox" name="game_platform" value="Mobile" class="rounded" /> Mobile</label>
            <label class="flex items-center gap-1.5 text-sm"><input type="checkbox" name="game_platform" value="VR" class="rounded" /> VR</label>
          </div>
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Favorite games <span class="text-gray-400 font-normal">(comma-separated)</span></label>
          <input id="favorite_games" type="text" maxlength="300" placeholder="e.g. Minecraft, CS:GO, Elden Ring"
            class="w-full border border-gray-300 rounded-lg px-4 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-sky-400" />
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Notable gaming achievements / history <span class="text-gray-400 font-normal">(optional)</span></label>
          <textarea id="notable_games" rows="3" maxlength="500"
            placeholder="e.g. Former tournament player, top 100 ranked in X, moderated Y community for 3 years…"
            class="w-full border border-gray-300 rounded-lg px-4 py-2 text-sm resize-none focus:outline-none focus:ring-2 focus:ring-sky-400"></textarea>
        </div>
      </div>

      <p id="form-error" class="text-red-500 text-sm hidden"></p>
      <button type="submit" id="save-btn"
        class="w-full bg-sky-600 hover:bg-sky-700 text-white py-3 rounded-lg font-medium transition-colors">
        Save Changes
      </button>
    </form>
  </main>

  <script>
    document.getElementById('menu-btn')?.addEventListener('click', () => {
      document.getElementById('mobile-menu').classList.toggle('hidden');
    });
  </script>
  <script type="module">
    import { requireAuth, updateNavAuth } from '/src/js/auth.js';
    import { supabase, showToast, setLoading } from '/src/js/supabase.js';

    updateNavAuth();
    const user = await requireAuth();

    // ── Load current profile ────────────────────────────────────────────────
    const [{ data: profile }, { data: modProfile }, { data: gamingProfile }] = await Promise.all([
      supabase.from('profiles').select('username, bio, role').eq('id', user.id).single(),
      supabase.from('moderator_profiles').select('platforms, hours_per_week, portfolio_url').eq('id', user.id).maybeSingle(),
      supabase.from('gaming_profiles').select('*').eq('id', user.id).maybeSingle(),
    ]);

    // Pre-fill form
    document.getElementById('username').value = profile?.username || '';
    const bioEl = document.getElementById('bio');
    bioEl.value = profile?.bio || '';
    document.getElementById('bio-count').textContent = `${bioEl.value.length} / 500`;

    const roleEl = document.getElementById('role');
    roleEl.value = profile?.role || 'both';

    if (modProfile?.platforms?.length) {
      document.querySelectorAll('[name="platform"]').forEach(cb => {
        cb.checked = modProfile.platforms.includes(cb.value);
      });
    }
    if (modProfile?.hours_per_week) {
      document.getElementById('hours_per_week').value = modProfile.hours_per_week;
    }
    if (modProfile?.portfolio_url) {
      document.getElementById('portfolio_url').value = modProfile.portfolio_url;
    }

    // Show/hide mod section based on role
    function syncModSection() {
      const show = roleEl.value !== 'hirer';
      document.getElementById('mod-section').classList.toggle('hidden', !show);
    }
    syncModSection();
    roleEl.addEventListener('change', syncModSection);

    // Bio character count
    bioEl.addEventListener('input', () => {
      document.getElementById('bio-count').textContent = `${bioEl.value.length} / 500`;
    });

    // Pre-fill gaming profile
    if (gamingProfile) {
      if (gamingProfile.gaming_since_year) document.getElementById('gaming_since_year').value = gamingProfile.gaming_since_year;
      if (gamingProfile.gaming_hours_week) document.getElementById('gaming_hours_week').value = gamingProfile.gaming_hours_week;
      if (gamingProfile.gaming_style) document.getElementById('gaming_style').value = gamingProfile.gaming_style;
      if (gamingProfile.favorite_games) document.getElementById('favorite_games').value = gamingProfile.favorite_games;
      if (gamingProfile.notable_games) document.getElementById('notable_games').value = gamingProfile.notable_games;
      if (gamingProfile.favorite_genres?.length) {
        document.querySelectorAll('[name="genre"]').forEach(cb => {
          cb.checked = gamingProfile.favorite_genres.includes(cb.value);
        });
      }
      if (gamingProfile.preferred_platforms?.length) {
        document.querySelectorAll('[name="game_platform"]').forEach(cb => {
          cb.checked = gamingProfile.preferred_platforms.includes(cb.value);
        });
      }
    }

    // ── Save ───────────────────────────────────────────────────────────────
    document.getElementById('profile-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('save-btn');
      const err = document.getElementById('form-error');
      err.classList.add('hidden');
      setLoading(btn, true);

      try {
        const role = roleEl.value;

        // Update profiles
        const { error: pErr } = await supabase.from('profiles').update({
          bio: bioEl.value.trim() || null,
          role,
        }).eq('id', user.id);
        if (pErr) throw pErr;

        // Upsert moderator_profiles if role includes moderator
        if (role !== 'hirer') {
          const platforms = Array.from(document.querySelectorAll('[name="platform"]:checked')).map(cb => cb.value);
          const hours = document.getElementById('hours_per_week').value;
          const portfolioUrl = document.getElementById('portfolio_url').value.trim() || null;

          const { error: mErr } = await supabase.from('moderator_profiles').upsert({
            id: user.id,
            platforms,
            hours_per_week: hours ? parseInt(hours) : null,
            portfolio_url: portfolioUrl,
          });
          if (mErr) throw mErr;
        }

        // Upsert gaming profile
        const favorite_genres = Array.from(document.querySelectorAll('[name="genre"]:checked')).map(cb => cb.value);
        const preferred_platforms = Array.from(document.querySelectorAll('[name="game_platform"]:checked')).map(cb => cb.value);
        const gamingSince = document.getElementById('gaming_since_year').value;
        const gamingHours = document.getElementById('gaming_hours_week').value;

        const { error: gErr } = await supabase.from('gaming_profiles').upsert({
          id: user.id,
          gaming_since_year:  gamingSince ? parseInt(gamingSince) : null,
          gaming_hours_week:  gamingHours ? parseInt(gamingHours) : null,
          gaming_style:       document.getElementById('gaming_style').value || null,
          favorite_genres,
          preferred_platforms,
          favorite_games:     document.getElementById('favorite_games').value.trim() || null,
          notable_games:      document.getElementById('notable_games').value.trim() || null,
        });
        if (gErr) throw gErr;

        showToast('Profile saved!');
      } catch (ex) {
        err.textContent = ex.message;
        err.classList.remove('hidden');
      } finally {
        setLoading(btn, false);
      }
    });
  </script>
</body>
</html>
