<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Forgot Password — Mods4Hire</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/src/css/styles.css" />
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center px-4 py-10">
  <div class="bg-white w-full max-w-md rounded-xl shadow-sm border border-gray-200 p-8">
    <a href="/" class="text-sky-600 font-bold text-xl block mb-6">Mods4Hire</a>
    <h1 class="text-2xl font-semibold text-gray-900 mb-2">Reset your password</h1>
    <p class="text-sm text-gray-500 mb-6">Enter your email and we'll send you a reset link.</p>

    <form id="forgot-form" class="space-y-4">
      <input id="email" type="email" placeholder="Email" required autocomplete="email"
        class="w-full border border-gray-300 rounded-lg px-4 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-sky-400" />
      <p id="error-msg" class="text-red-500 text-sm hidden"></p>
      <button type="submit" id="submit-btn"
        class="w-full bg-sky-600 text-white py-2 rounded-lg text-sm font-medium hover:bg-sky-700 transition">Send Reset Link</button>
    </form>

    <div id="success-msg" class="hidden text-center py-4">
      <div class="text-4xl mb-3">📧</div>
      <h3 class="font-bold text-gray-900 text-lg mb-2">Check your email</h3>
      <p class="text-gray-500 text-sm leading-relaxed">We sent a password reset link to your email. Click it to set a new password.</p>
      <a href="/login.html" class="inline-block mt-4 text-sm text-sky-600 hover:underline">← Back to Log In</a>
    </div>

    <p class="mt-4 text-sm text-gray-500 text-center">
      <a href="/login.html" class="text-sky-600 hover:underline">← Back to Log In</a>
    </p>
  </div>

  <script type="module">
    import { resetPasswordForEmail } from '/src/js/auth.js';
    import { setLoading } from '/src/js/supabase.js';

    document.getElementById('forgot-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('submit-btn');
      const errEl = document.getElementById('error-msg');
      errEl.classList.add('hidden');
      setLoading(btn, true);
      try {
        await resetPasswordForEmail(document.getElementById('email').value);
        document.getElementById('forgot-form').classList.add('hidden');
        document.querySelector('h1').classList.add('hidden');
        document.querySelector('p.text-gray-500').classList.add('hidden');
        document.querySelector('p.mt-4').classList.add('hidden');
        document.getElementById('success-msg').classList.remove('hidden');
      } catch (err) {
        errEl.textContent = err.message;
        errEl.classList.remove('hidden');
      } finally {
        setLoading(btn, false);
      }
    });
  </script>
</body>
</html>
