<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Browse Users — Mods4Hire</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/src/css/styles.css" />
</head>
<body class="bg-gray-50 min-h-screen">

  <nav class="bg-white border-b border-gray-200 sticky top-0 z-50">
    <div class="max-w-6xl mx-auto px-4">
      <div class="flex items-center justify-between h-14">
        <a href="/" class="text-xl font-bold text-sky-600 shrink-0">Mods4Hire</a>
        <div class="hidden md:flex items-center gap-6">
          <a href="/listings.html" class="text-sm text-gray-600 hover:text-sky-600 transition-colors">Browse Listings</a>
          <a href="/moderators.html" class="text-sm text-gray-600 hover:text-sky-600 transition-colors">Moderators</a>
          <a href="/users.html" class="text-sm text-sky-600 font-medium transition-colors">Users</a>
        </div>
        <div class="hidden md:flex items-center gap-6">
          <div id="auth-links" class="flex items-center gap-6"></div>
          <a href="/listings-new.html" class="bg-sky-600 hover:bg-sky-700 text-white text-sm px-4 py-2 rounded-lg font-medium transition-colors">Create a Listing</a>
        </div>
        <div class="flex md:hidden items-center gap-2">
          <a href="/listings-new.html" class="bg-sky-600 text-white text-xs px-3 py-1.5 rounded-lg font-medium">Post</a>
          <button id="menu-btn" aria-label="Open menu" class="p-2 rounded-lg text-gray-600 hover:bg-gray-100">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/></svg>
          </button>
        </div>
      </div>
      <div id="mobile-menu" class="hidden md:hidden border-t border-gray-100 py-3 space-y-0.5 pb-4">
        <a href="/listings.html" class="block px-3 py-2.5 text-sm text-gray-700 hover:text-sky-600 hover:bg-gray-50 rounded-lg">Browse Listings</a>
        <a href="/moderators.html" class="block px-3 py-2.5 text-sm text-gray-700 hover:text-sky-600 hover:bg-gray-50 rounded-lg">Moderators</a>
        <a href="/users.html" class="block px-3 py-2.5 text-sm text-gray-700 hover:text-sky-600 hover:bg-gray-50 rounded-lg">Users</a>
        <div id="mobile-auth-links" class="pt-2 border-t border-gray-100 mt-2"></div>
      </div>
    </div>
  </nav>

  <main class="max-w-6xl mx-auto px-4 py-10">

    <!-- Page heading -->
    <div class="mb-8">
      <h1 class="text-2xl font-bold text-gray-900">Browse Users</h1>
      <p class="text-sm text-gray-500 mt-1">Find moderators and hirers in the community</p>
    </div>

    <!-- Search -->
    <div class="mb-8">
      <input
        id="search-input"
        type="text"
        placeholder="Search by username…"
        class="w-full max-w-md border border-gray-300 rounded-lg px-4 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-sky-400"
      />
    </div>

    <!-- Status message -->
    <p id="status-msg" class="text-sm text-gray-500 mb-4 hidden"></p>

    <!-- User grid -->
    <div id="users-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-5">
      <!-- Cards injected by JS -->
    </div>

    <!-- Empty state -->
    <div id="empty-state" class="hidden text-center py-20 text-gray-400">
      <p class="text-lg font-medium">No users found</p>
      <p class="text-sm mt-1">Try a different search term</p>
    </div>

    <!-- Loading state -->
    <div id="loading-state" class="text-center py-20 text-gray-400">
      <p class="text-sm">Loading users…</p>
    </div>

  </main>

  <!-- Mobile menu toggle (non-module) -->
  <script>
    const menuBtn = document.getElementById('menu-btn');
    const mobileMenu = document.getElementById('mobile-menu');
    if (menuBtn && mobileMenu) {
      menuBtn.addEventListener('click', () => {
        mobileMenu.classList.toggle('hidden');
      });
    }
  </script>

  <!-- Main page logic (module) -->
  <script type="module">
    import { updateNavAuth } from '/src/js/auth.js';
    import { supabase, escapeHtml } from '/src/js/supabase.js';

    updateNavAuth();

    const grid = document.getElementById('users-grid');
    const emptyState = document.getElementById('empty-state');
    const loadingState = document.getElementById('loading-state');
    const statusMsg = document.getElementById('status-msg');
    const searchInput = document.getElementById('search-input');

    function roleBadge(role) {
      if (role === 'hirer') {
        return `<span class="inline-block text-xs font-medium px-2 py-0.5 rounded-full bg-blue-100 text-blue-700">Hirer</span>`;
      }
      if (role === 'moderator') {
        return `<span class="inline-block text-xs font-medium px-2 py-0.5 rounded-full bg-green-100 text-green-700">Moderator</span>`;
      }
      if (role === 'both') {
        return `<span class="inline-block text-xs font-medium px-2 py-0.5 rounded-full bg-purple-100 text-purple-700">Hirer &amp; Moderator</span>`;
      }
      return '';
    }

    function ratingDisplay(avg, count) {
      if (!count || count === 0) return `<span class="text-gray-400 text-xs">No ratings yet</span>`;
      const rounded = parseFloat(avg).toFixed(1);
      return `<span class="text-xs text-gray-600">&#11088; ${rounded} <span class="text-gray-400">(${count} rating${count === 1 ? '' : 's'})</span></span>`;
    }

    function memberSince(createdAt) {
      const date = new Date(createdAt);
      return date.toLocaleDateString('en-US', { month: 'long', year: 'numeric' });
    }

    function avatarLetter(username) {
      return username ? username.charAt(0).toUpperCase() : '?';
    }

    function buildCard(user) {
      const letter = escapeHtml(avatarLetter(user.username));
      const name = escapeHtml(user.username || 'Unknown');
      const href = `/moderator.html?id=${encodeURIComponent(user.id)}`;

      return `
        <a href="${href}" class="block bg-white border border-gray-200 rounded-xl p-5 hover:shadow-md hover:border-sky-200 transition-all">
          <div class="flex items-center gap-3 mb-3">
            <div class="w-10 h-10 rounded-full bg-sky-100 text-sky-700 flex items-center justify-center text-sm font-bold shrink-0">
              ${letter}
            </div>
            <div class="min-w-0">
              <p class="font-bold text-gray-900 text-sm truncate">${name}</p>
              <div class="mt-0.5">${roleBadge(user.role)}</div>
            </div>
          </div>
          ${user.bio ? `<p class="text-xs text-gray-500 mb-3 line-clamp-2">${escapeHtml(user.bio)}</p>` : ''}
          <div class="flex flex-col gap-1">
            <div>${ratingDisplay(user.rating_avg, user.rating_count)}</div>
            <span class="text-xs text-gray-400">Member since ${memberSince(user.created_at)}</span>
          </div>
        </a>
      `;
    }

    function renderUsers(users) {
      loadingState.classList.add('hidden');
      grid.innerHTML = '';

      if (!users || users.length === 0) {
        emptyState.classList.remove('hidden');
        return;
      }

      emptyState.classList.add('hidden');
      grid.innerHTML = users.map(buildCard).join('');
    }

    async function loadUsers(searchTerm = '') {
      loadingState.classList.remove('hidden');
      emptyState.classList.add('hidden');
      grid.innerHTML = '';

      let query = supabase
        .from('profiles')
        .select('id, username, role, bio, rating_avg, rating_count, created_at')
        .order('created_at', { ascending: false })
        .limit(20);

      if (searchTerm && searchTerm.length >= 2) {
        query = query.ilike('username', `%${searchTerm}%`);
      }

      const { data, error } = await query;

      if (error) {
        loadingState.classList.add('hidden');
        statusMsg.textContent = 'Failed to load users. Please try again.';
        statusMsg.classList.remove('hidden');
        console.error('Error loading users:', error);
        return;
      }

      statusMsg.classList.add('hidden');
      renderUsers(data);
    }

    // Debounce helper
    function debounce(fn, delay) {
      let timer;
      return (...args) => {
        clearTimeout(timer);
        timer = setTimeout(() => fn(...args), delay);
      };
    }

    const debouncedSearch = debounce((value) => {
      if (value.length === 0 || value.length >= 2) {
        loadUsers(value);
      }
    }, 350);

    searchInput.addEventListener('input', (e) => {
      debouncedSearch(e.target.value.trim());
    });

    // Initial load
    loadUsers();
  </script>

</body>
</html>
