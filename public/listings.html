<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Job Listings — Mods4Hire</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/src/css/styles.css" />
</head>
<body class="bg-gray-50 min-h-screen">
  <nav class="bg-white border-b border-gray-200 sticky top-0 z-50">
    <div class="max-w-6xl mx-auto px-4">
      <div class="flex items-center justify-between h-14">
        <a href="/" class="text-xl font-bold text-sky-600 shrink-0">Mods4Hire</a>
        <div class="hidden md:flex items-center gap-6">
          <a href="/listings.html" class="text-sm text-sky-600 font-medium">Browse Listings</a>
          <a href="/moderators.html" class="text-sm text-gray-600 hover:text-sky-600 transition-colors">Moderators</a>
        </div>
        <div class="hidden md:flex items-center gap-3">
          <a href="/listings-new.html" class="bg-sky-600 hover:bg-sky-700 text-white text-sm px-4 py-2 rounded-lg font-medium transition-colors">+ Post a Listing</a>
          <div id="auth-links" class="flex items-center gap-3"></div>
        </div>
        <div class="flex md:hidden items-center gap-2">
          <a href="/listings-new.html" class="bg-sky-600 text-white text-xs px-3 py-1.5 rounded-lg font-medium">Post</a>
          <button id="menu-btn" aria-label="Open menu" class="p-2 rounded-lg text-gray-600 hover:bg-gray-100">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/></svg>
          </button>
        </div>
      </div>
      <div id="mobile-menu" class="hidden md:hidden border-t border-gray-100 py-3 space-y-0.5 pb-4">
        <a href="/listings.html" class="block px-3 py-2.5 text-sm text-sky-600 font-medium hover:bg-gray-50 rounded-lg">Browse Listings</a>
        <a href="/moderators.html" class="block px-3 py-2.5 text-sm text-gray-700 hover:text-sky-600 hover:bg-gray-50 rounded-lg">Moderators</a>
        <div id="mobile-auth-links" class="pt-2 border-t border-gray-100 mt-2"></div>
      </div>
    </div>
  </nav>
  <main class="max-w-6xl mx-auto px-4 py-10">
    <h1 class="text-2xl font-bold text-gray-900 mb-5">Browse Listings</h1>

    <!-- ── Main filters ──────────────────────────────────────────────────── -->
    <div class="flex flex-wrap gap-3 mb-3">
      <select id="filter-platform" class="border border-gray-300 rounded-lg px-3 py-1.5 text-sm bg-white">
        <option value="">All Platforms</option>
        <option value="Discord">Discord</option>
        <option value="TeamSpeak">TeamSpeak</option>
        <option value="Reddit">Reddit</option>
        <option value="Twitch">Twitch</option>
        <option value="Games">Gaming</option>
        <option value="Forum">Forum</option>
        <option value="Other">Other</option>
      </select>
      <select id="filter-comp" class="border border-gray-300 rounded-lg px-3 py-1.5 text-sm bg-white">
        <option value="">All Compensation Types</option>
        <option value="paid_hourly">Hourly</option>
        <option value="monthly_retainer">Monthly Retainer</option>
        <option value="salary">Salary</option>
        <option value="volunteer">Volunteer Mods</option>
      </select>
      <select id="filter-rating" class="border border-gray-300 rounded-lg px-3 py-1.5 text-sm bg-white">
        <option value="">⭐ Any Rating</option>
        <option value="3">⭐ 3+ Stars</option>
        <option value="4">⭐ 4+ Stars</option>
        <option value="4.5">⭐ 4.5+ Stars</option>
      </select>
      <button id="toggle-advanced" class="ml-auto flex items-center gap-1.5 text-sm text-gray-500 hover:text-sky-600 border border-gray-300 rounded-lg px-3 py-1.5 bg-white transition-colors">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 4a1 1 0 011-1h16a1 1 0 010 2H4a1 1 0 01-1-1zm3 6a1 1 0 011-1h10a1 1 0 010 2H7a1 1 0 01-1-1zm3 6a1 1 0 011-1h4a1 1 0 010 2h-4a1 1 0 01-1-1z"/></svg>
        Advanced Filters
      </button>
    </div>

    <!-- ── Advanced filters (hidden by default) ──────────────────────────── -->
    <div id="advanced-filters" class="hidden mb-5 p-5 bg-white border border-gray-200 rounded-xl space-y-5">
      <div class="flex items-center justify-between">
        <p class="text-xs font-semibold text-gray-400 uppercase tracking-widest">Advanced Filters</p>
        <button id="reset-filters" class="text-xs text-sky-600 hover:underline">Reset all</button>
      </div>

      <!-- Communication servers -->
      <div>
        <p class="text-xs font-medium text-gray-500 mb-2">Communication Servers</p>
        <div class="flex flex-wrap gap-2">
          <button type="button" data-adv-platform="Discord"    class="adv-pill px-3 py-1 rounded-full text-xs border border-gray-300 bg-white hover:border-sky-400 hover:text-sky-600 transition-colors">Discord</button>
          <button type="button" data-adv-platform="TeamSpeak"  class="adv-pill px-3 py-1 rounded-full text-xs border border-gray-300 bg-white hover:border-sky-400 hover:text-sky-600 transition-colors">TeamSpeak</button>
        </div>
      </div>

      <!-- Streaming -->
      <div>
        <p class="text-xs font-medium text-gray-500 mb-2">Streaming</p>
        <div class="flex flex-wrap gap-2">
          <button type="button" data-adv-platform="Twitch"  class="adv-pill px-3 py-1 rounded-full text-xs border border-gray-300 bg-white hover:border-sky-400 hover:text-sky-600 transition-colors">Twitch</button>
          <button type="button" data-adv-platform="Kick"    class="adv-pill px-3 py-1 rounded-full text-xs border border-gray-300 bg-white hover:border-sky-400 hover:text-sky-600 transition-colors">Kick</button>
          <button type="button" data-adv-platform="YouTube" class="adv-pill px-3 py-1 rounded-full text-xs border border-gray-300 bg-white hover:border-sky-400 hover:text-sky-600 transition-colors">YouTube</button>
        </div>
      </div>

      <!-- Forums & communities -->
      <div>
        <p class="text-xs font-medium text-gray-500 mb-2">Forums & Communities</p>
        <div class="flex flex-wrap gap-2">
          <button type="button" data-adv-platform="Reddit"         class="adv-pill px-3 py-1 rounded-full text-xs border border-gray-300 bg-white hover:border-sky-400 hover:text-sky-600 transition-colors">Reddit</button>
          <button type="button" data-adv-platform="Forum"          class="adv-pill px-3 py-1 rounded-full text-xs border border-gray-300 bg-white hover:border-sky-400 hover:text-sky-600 transition-colors">phpBB / XenForo / Discourse</button>
          <button type="button" data-adv-platform="Steam"          class="adv-pill px-3 py-1 rounded-full text-xs border border-gray-300 bg-white hover:border-sky-400 hover:text-sky-600 transition-colors">Steam Discussions</button>
          <button type="button" data-adv-platform="Facebook Groups" class="adv-pill px-3 py-1 rounded-full text-xs border border-gray-300 bg-white hover:border-sky-400 hover:text-sky-600 transition-colors">Facebook Groups</button>
          <button type="button" data-adv-platform="Other"          class="adv-pill px-3 py-1 rounded-full text-xs border border-gray-300 bg-white hover:border-sky-400 hover:text-sky-600 transition-colors">Custom / Other</button>
        </div>
      </div>

      <!-- Game servers -->
      <div>
        <p class="text-xs font-medium text-gray-500 mb-2">Game Servers</p>
        <div class="flex flex-wrap gap-2">
          <button type="button" data-adv-platform="Garry's Mod" class="adv-pill px-3 py-1 rounded-full text-xs border border-gray-300 bg-white hover:border-sky-400 hover:text-sky-600 transition-colors">Garry's Mod</button>
          <button type="button" data-adv-platform="Rust"        class="adv-pill px-3 py-1 rounded-full text-xs border border-gray-300 bg-white hover:border-sky-400 hover:text-sky-600 transition-colors">Rust</button>
          <button type="button" data-adv-platform="Minecraft"   class="adv-pill px-3 py-1 rounded-full text-xs border border-gray-300 bg-white hover:border-sky-400 hover:text-sky-600 transition-colors">Minecraft</button>
          <button type="button" data-adv-platform="FiveM"       class="adv-pill px-3 py-1 rounded-full text-xs border border-gray-300 bg-white hover:border-sky-400 hover:text-sky-600 transition-colors">FiveM / GTA RP</button>
          <button type="button" data-adv-platform="Ark"         class="adv-pill px-3 py-1 rounded-full text-xs border border-gray-300 bg-white hover:border-sky-400 hover:text-sky-600 transition-colors">Ark: Survival</button>
          <button type="button" data-adv-platform="DayZ"        class="adv-pill px-3 py-1 rounded-full text-xs border border-gray-300 bg-white hover:border-sky-400 hover:text-sky-600 transition-colors">DayZ</button>
          <button type="button" data-adv-platform="CS2"         class="adv-pill px-3 py-1 rounded-full text-xs border border-gray-300 bg-white hover:border-sky-400 hover:text-sky-600 transition-colors">CS2</button>
          <button type="button" data-adv-platform="Unturned"    class="adv-pill px-3 py-1 rounded-full text-xs border border-gray-300 bg-white hover:border-sky-400 hover:text-sky-600 transition-colors">Unturned</button>
          <button type="button" data-adv-platform="Other Game"  class="adv-pill px-3 py-1 rounded-full text-xs border border-gray-300 bg-white hover:border-sky-400 hover:text-sky-600 transition-colors">Other Game</button>
        </div>
      </div>

      <!-- Row: hours + sort + deadline -->
      <div class="flex flex-wrap gap-4 pt-1 border-t border-gray-100">
        <div>
          <p class="text-xs font-medium text-gray-500 mb-1.5">Hours / week</p>
          <select id="filter-hours" class="border border-gray-300 rounded-lg px-3 py-1.5 text-sm bg-white">
            <option value="">Any</option>
            <option value="5">Up to 5 hrs</option>
            <option value="15">Up to 15 hrs</option>
            <option value="30">Up to 30 hrs</option>
            <option value="60">Up to 60 hrs</option>
          </select>
        </div>
        <div>
          <p class="text-xs font-medium text-gray-500 mb-1.5">Sort by</p>
          <select id="filter-sort" class="border border-gray-300 rounded-lg px-3 py-1.5 text-sm bg-white">
            <option value="newest">Newest first</option>
            <option value="oldest">Oldest first</option>
            <option value="deadline">Deadline soonest</option>
          </select>
        </div>
        <div>
          <p class="text-xs font-medium text-gray-500 mb-1.5">Compensation</p>
          <select id="filter-comp-adv" class="border border-gray-300 rounded-lg px-3 py-1.5 text-sm bg-white">
            <option value="">All Types</option>
            <option value="paid_hourly">Hourly</option>
            <option value="monthly_retainer">Monthly Retainer</option>
            <option value="salary">Salary</option>
            <option value="volunteer">Volunteer Mods</option>
          </select>
        </div>
        <div>
          <p class="text-xs font-medium text-gray-500 mb-1.5">Min. Hirer Rating</p>
          <select id="filter-rating-adv" class="border border-gray-300 rounded-lg px-3 py-1.5 text-sm bg-white">
            <option value="">Any Rating</option>
            <option value="3">3+ Stars</option>
            <option value="4">4+ Stars</option>
            <option value="4.5">4.5+ Stars</option>
          </select>
        </div>
        <div class="flex items-end pb-0.5">
          <label class="flex items-center gap-2 text-sm text-gray-600 cursor-pointer">
            <input type="checkbox" id="filter-deadline" class="rounded" />
            Has deadline set
          </label>
        </div>
      </div>
    </div>

    <div id="listings-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">
      <p class="text-gray-400 text-sm">Loading…</p>
    </div>
    <div class="mt-8 text-center">
      <button id="load-more" class="hidden text-sky-600 hover:underline text-sm">Load more</button>
    </div>
  </main>

  <style>
    .active-pill { border-color: #0ea5e9; color: #0ea5e9; background: #f0f9ff; }
  </style>
  <script>
  document.getElementById('menu-btn')?.addEventListener('click', () => {
    document.getElementById('mobile-menu').classList.toggle('hidden');
  });
</script>
  <script type="module">
    import { getListings, renderListingCard } from '/src/js/listings.js';
    import { updateNavAuth } from '/src/js/auth.js';
    updateNavAuth();

    // Pre-select platform from URL param (e.g. ?platform=Discord from homepage links)
    const urlPlatform = new URLSearchParams(window.location.search).get('platform');
    if (urlPlatform) document.getElementById('filter-platform').value = urlPlatform;

    // Advanced filters toggle
    document.getElementById('toggle-advanced').addEventListener('click', () => {
      const panel = document.getElementById('advanced-filters');
      panel.classList.toggle('hidden');
      const btn = document.getElementById('toggle-advanced');
      btn.classList.toggle('text-sky-600', !panel.classList.contains('hidden'));
      btn.classList.toggle('border-sky-400', !panel.classList.contains('hidden'));
    });

    // Sync advanced comp/rating selects with main filter bar (bidirectional)
    function syncSelects(a, b) {
      document.getElementById(a).addEventListener('change', () => { document.getElementById(b).value = document.getElementById(a).value; page = 0; load(); });
      document.getElementById(b).addEventListener('change', () => { document.getElementById(a).value = document.getElementById(b).value; page = 0; load(); });
    }
    syncSelects('filter-comp', 'filter-comp-adv');
    syncSelects('filter-rating', 'filter-rating-adv');

    // Advanced platform pills — clicking one overrides the main platform dropdown
    let activeAdvPlatform = '';
    document.querySelectorAll('.adv-pill').forEach(pill => {
      pill.addEventListener('click', () => {
        const isActive = pill.classList.contains('active-pill');
        document.querySelectorAll('.adv-pill').forEach(p => p.classList.remove('active-pill'));
        if (!isActive) {
          pill.classList.add('active-pill');
          activeAdvPlatform = pill.dataset.advPlatform;
          document.getElementById('filter-platform').value = '';
        } else {
          activeAdvPlatform = '';
        }
        page = 0; load();
      });
    });

    // Reset pills when main platform dropdown changes manually
    document.getElementById('filter-platform').addEventListener('change', () => {
      document.querySelectorAll('.adv-pill').forEach(p => p.classList.remove('active-pill'));
      activeAdvPlatform = '';
      page = 0; load();
    });

    // Hours, sort, deadline filters
    ['filter-hours', 'filter-sort', 'filter-deadline'].forEach(id => {
      document.getElementById(id).addEventListener('change', () => { page = 0; load(); });
    });

    // Reset all button
    document.getElementById('reset-filters').addEventListener('click', () => {
      ['filter-platform','filter-comp','filter-rating','filter-comp-adv','filter-rating-adv','filter-hours','filter-sort'].forEach(id => { document.getElementById(id).value = id === 'filter-sort' ? 'newest' : ''; });
      document.getElementById('filter-deadline').checked = false;
      document.querySelectorAll('.adv-pill').forEach(p => p.classList.remove('active-pill'));
      activeAdvPlatform = '';
      page = 0; load();
    });

    let page = 0;
    async function load() {
      const platform = activeAdvPlatform || document.getElementById('filter-platform').value;
      const comp     = document.getElementById('filter-comp').value;
      const minRating = document.getElementById('filter-rating').value;
      const maxHours  = document.getElementById('filter-hours').value;
      const sortBy    = document.getElementById('filter-sort').value;
      const hasDeadline = document.getElementById('filter-deadline').checked;
      const listings = await getListings({ page, platform: platform || undefined, compensation: comp || undefined, minRating: minRating || undefined, maxHours: maxHours || undefined, hasDeadline: hasDeadline || undefined, sortBy });
      const grid = document.getElementById('listings-grid');
      if (page === 0) grid.innerHTML = '';
      if (!listings.length && page === 0) { grid.innerHTML = '<p class="text-gray-400 text-sm">No listings found.</p>'; return; }
      listings.forEach(l => grid.appendChild(renderListingCard(l)));
      document.getElementById('load-more').classList.toggle('hidden', listings.length < 12);
    }
    load();
    document.getElementById('load-more').addEventListener('click', () => { page++; load(); });
  </script>
</body>
</html>
