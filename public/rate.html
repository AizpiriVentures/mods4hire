<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rate User — Mods4Hire</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/src/css/styles.css" />
  <style>
    .star-row { display: flex; flex-direction: row-reverse; gap: 0.25rem; }
    .star-row input { display: none; }
    .star-row label { font-size: 1.75rem; color: #d1d5db; cursor: pointer; transition: color 0.1s; line-height: 1; }
    .star-row input:checked ~ label,
    .star-row label:hover,
    .star-row label:hover ~ label { color: #f59e0b; }
  </style>
</head>
<body class="bg-gray-50 min-h-screen">

  <nav class="bg-white border-b border-gray-200 sticky top-0 z-50">
    <div class="max-w-6xl mx-auto px-4">
      <div class="flex items-center justify-between h-14">
        <a href="/" class="text-xl font-bold text-sky-600">Mods4Hire</a>
        <div id="auth-links" class="flex items-center gap-6"></div>
      </div>
    </div>
  </nav>

  <main class="max-w-lg mx-auto px-4 py-10">
    <div id="loading" class="text-gray-400 text-sm">Loading…</div>
    <div id="already-rated" class="hidden bg-green-50 border border-green-200 rounded-xl p-6 text-center">
      <p class="text-green-700 font-medium text-lg">You've already rated this person.</p>
      <a href="/dashboard.html" class="mt-4 inline-block text-sm text-sky-600 hover:underline">← Back to Dashboard</a>
    </div>
    <div id="rate-form-wrap" class="hidden">
      <h1 class="text-2xl font-bold text-gray-900 mb-1">Leave a Rating</h1>
      <p class="text-sm text-gray-500 mb-8">Rating <span id="ratee-name" class="font-medium text-gray-700"></span></p>

      <form id="rate-form" class="bg-white border border-gray-200 rounded-xl p-6 space-y-6">

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-2">Reliability</label>
          <div class="star-row" id="stars-reliability">
            <input type="radio" name="reliability" id="rel5" value="5" required /><label for="rel5">★</label>
            <input type="radio" name="reliability" id="rel4" value="4" /><label for="rel4">★</label>
            <input type="radio" name="reliability" id="rel3" value="3" /><label for="rel3">★</label>
            <input type="radio" name="reliability" id="rel2" value="2" /><label for="rel2">★</label>
            <input type="radio" name="reliability" id="rel1" value="1" /><label for="rel1">★</label>
          </div>
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-2">Communication</label>
          <div class="star-row">
            <input type="radio" name="communication" id="com5" value="5" required /><label for="com5">★</label>
            <input type="radio" name="communication" id="com4" value="4" /><label for="com4">★</label>
            <input type="radio" name="communication" id="com3" value="3" /><label for="com3">★</label>
            <input type="radio" name="communication" id="com2" value="2" /><label for="com2">★</label>
            <input type="radio" name="communication" id="com1" value="1" /><label for="com1">★</label>
          </div>
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-2">Judgment</label>
          <div class="star-row">
            <input type="radio" name="judgment" id="jud5" value="5" required /><label for="jud5">★</label>
            <input type="radio" name="judgment" id="jud4" value="4" /><label for="jud4">★</label>
            <input type="radio" name="judgment" id="jud3" value="3" /><label for="jud3">★</label>
            <input type="radio" name="judgment" id="jud2" value="2" /><label for="jud2">★</label>
            <input type="radio" name="judgment" id="jud1" value="1" /><label for="jud1">★</label>
          </div>
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-2">Professionalism</label>
          <div class="star-row">
            <input type="radio" name="professionalism" id="pro5" value="5" required /><label for="pro5">★</label>
            <input type="radio" name="professionalism" id="pro4" value="4" /><label for="pro4">★</label>
            <input type="radio" name="professionalism" id="pro3" value="3" /><label for="pro3">★</label>
            <input type="radio" name="professionalism" id="pro2" value="2" /><label for="pro2">★</label>
            <input type="radio" name="professionalism" id="pro1" value="1" /><label for="pro1">★</label>
          </div>
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Comment <span class="font-normal text-gray-400">(optional)</span></label>
          <textarea id="comment" rows="3" maxlength="500" placeholder="Share your experience working with this person…"
            class="w-full border border-gray-300 rounded-lg px-4 py-2 text-sm resize-none focus:outline-none focus:ring-2 focus:ring-sky-400"></textarea>
        </div>

        <p id="rate-error" class="text-red-500 text-sm hidden"></p>
        <button type="submit" id="submit-btn"
          class="w-full bg-sky-600 hover:bg-sky-700 text-white py-3 rounded-lg font-medium transition-colors">
          Submit Rating
        </button>
      </form>
    </div>
  </main>

  <script type="module">
    import { requireAuth, updateNavAuth } from '/src/js/auth.js';
    import { supabase, setLoading } from '/src/js/supabase.js';
    import { submitRating } from '/src/js/ratings.js';

    updateNavAuth();
    const user = await requireAuth();

    const params = new URLSearchParams(location.search);
    const rateeId = params.get('ratee');
    if (!rateeId) window.location.href = '/dashboard.html';

    // Load ratee username
    const { data: ratee } = await supabase
      .from('profiles')
      .select('username')
      .eq('id', rateeId)
      .single();

    // Check if already rated
    const { data: existing } = await supabase
      .from('ratings')
      .select('id')
      .eq('rater_id', user.id)
      .eq('ratee_id', rateeId)
      .maybeSingle();

    document.getElementById('loading').classList.add('hidden');

    if (existing) {
      document.getElementById('already-rated').classList.remove('hidden');
    } else {
      document.getElementById('ratee-name').textContent = ratee?.username || '(unknown)';
      document.getElementById('rate-form-wrap').classList.remove('hidden');
    }

    document.getElementById('rate-form').addEventListener('submit', async e => {
      e.preventDefault();
      const btn = document.getElementById('submit-btn');
      const err = document.getElementById('rate-error');
      err.classList.add('hidden');
      setLoading(btn, true);

      const fd = new FormData(e.target);
      try {
        await submitRating({
          rateeId,
          reliability:     parseInt(fd.get('reliability')),
          communication:   parseInt(fd.get('communication')),
          judgment:        parseInt(fd.get('judgment')),
          professionalism: parseInt(fd.get('professionalism')),
          comment:         document.getElementById('comment').value,
        });
        window.location.href = '/dashboard.html?rated=1';
      } catch (ex) {
        err.textContent = ex.message;
        err.classList.remove('hidden');
        setLoading(btn, false);
      }
    });
  </script>
</body>
</html>
