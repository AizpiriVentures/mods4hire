<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard — Mods4Hire</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/src/css/styles.css" />
</head>
<body class="bg-gray-50 min-h-screen">
  <nav class="bg-white border-b border-gray-200 sticky top-0 z-50">
    <div class="max-w-6xl mx-auto px-4">
      <div class="flex items-center justify-between h-14">
        <a href="/" class="text-xl font-bold text-sky-600 shrink-0">Mods4Hire</a>
        <div class="hidden md:flex items-center gap-6">
          <a href="/listings.html" class="text-sm text-gray-600 hover:text-sky-600 transition-colors">Browse Listings</a>
          <a href="/moderators.html" class="text-sm text-gray-600 hover:text-sky-600 transition-colors">Moderators</a>
        </div>
        <div class="hidden md:flex items-center gap-3">
          <a href="/listings-new.html" class="bg-sky-600 hover:bg-sky-700 text-white text-sm px-4 py-2 rounded-lg font-medium transition-colors">+ Post a Listing</a>
          <div id="auth-links" class="flex items-center gap-3"><a href="/login.html" class="text-sm text-gray-600 hover:text-sky-600">Log In</a><a href="/login.html#register" class="text-sm bg-sky-600 text-white px-3 py-1 rounded-lg hover:bg-sky-700">Sign Up</a></div>
        </div>
        <div class="flex md:hidden items-center gap-2">
          <a href="/listings-new.html" class="bg-sky-600 text-white text-xs px-3 py-1.5 rounded-lg font-medium">Post</a>
          <button id="menu-btn" aria-label="Open menu" class="p-2 rounded-lg text-gray-600 hover:bg-gray-100">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/></svg>
          </button>
        </div>
      </div>
      <div id="mobile-menu" class="hidden md:hidden border-t border-gray-100 py-3 space-y-0.5 pb-4">
        <a href="/listings.html" class="block px-3 py-2.5 text-sm text-gray-700 hover:text-sky-600 hover:bg-gray-50 rounded-lg">Browse Listings</a>
        <a href="/moderators.html" class="block px-3 py-2.5 text-sm text-gray-700 hover:text-sky-600 hover:bg-gray-50 rounded-lg">Moderators</a>
        <div id="mobile-auth-links" class="pt-2 border-t border-gray-100 mt-2"></div>
      </div>
    </div>
  </nav>
  <main class="max-w-4xl mx-auto px-4 py-10">
    <h1 class="text-2xl font-bold text-gray-900 mb-8">My Dashboard</h1>
    <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
      <div>
        <div class="flex items-center justify-between mb-4">
          <h2 class="font-semibold text-lg text-gray-800">My Listings</h2>
          <a href="/listings-new.html" class="text-xs bg-sky-600 text-white px-3 py-1.5 rounded-lg hover:bg-sky-700">+ Post a Listing</a>
        </div>
        <div id="my-listings"><p class="text-gray-400 text-sm">Loading…</p></div>
      </div>
      <div>
        <h2 class="font-semibold text-lg text-gray-800 mb-4">My Applications</h2>
        <div id="my-apps"><p class="text-gray-400 text-sm">Loading…</p></div>
      </div>
    </div>
  </main>
  <script>
  document.getElementById('menu-btn')?.addEventListener('click', () => {
    document.getElementById('mobile-menu').classList.toggle('hidden');
  });
</script>
  <script type="module">
    import { requireAuth, updateNavAuth } from '/src/js/auth.js';
    import { supabase, escapeHtml } from '/src/js/supabase.js';

    updateNavAuth();
    const user = await requireAuth();

    const { data: listings } = await supabase.from('job_listings').select('id,title,status').eq('hirer_id', user.id).order('created_at', { ascending: false });
    const lEl = document.getElementById('my-listings');
    lEl.innerHTML = '';
    if (!listings?.length) lEl.innerHTML = '<p class="text-gray-400 text-sm">No listings yet.</p>';
    else listings.forEach(l => {
      const div = document.createElement('div');
      div.className = 'bg-white border border-gray-200 rounded-xl p-4 mb-3 flex items-center justify-between';
      div.innerHTML = `<a href="/listing.html?id=${l.id}" class="font-medium text-gray-800 hover:text-sky-600">${escapeHtml(l.title)}</a><span class="text-xs text-gray-400">${l.status}</span>`;
      lEl.appendChild(div);
    });

    const { data: apps } = await supabase.from('applications').select('id,status,job_listings(id,title)').order('applied_at', { ascending: false });
    const aEl = document.getElementById('my-apps');
    aEl.innerHTML = '';
    if (!apps?.length) aEl.innerHTML = '<p class="text-gray-400 text-sm">No applications yet.</p>';
    else apps.forEach(a => {
      const STATUS = { pending: 'text-yellow-600', accepted: 'text-green-600', rejected: 'text-red-500' };
      const div = document.createElement('div');
      div.className = 'bg-white border border-gray-200 rounded-xl p-4 mb-3 flex items-center justify-between';
      div.innerHTML = `<a href="/listing.html?id=${a.job_listings?.id}" class="font-medium text-gray-800 hover:text-sky-600">${escapeHtml(a.job_listings?.title||'—')}</a><span class="text-xs ${STATUS[a.status]||''}">${a.status}</span>`;
      aEl.appendChild(div);
    });
  </script>
</body>
</html>
