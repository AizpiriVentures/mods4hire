<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Browse Moderators — Mods4Hire</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/src/css/styles.css" />
</head>
<body class="bg-gray-50 min-h-screen">
  <nav class="bg-white border-b border-gray-200 sticky top-0 z-50">
    <div class="max-w-6xl mx-auto px-4">
      <div class="flex items-center justify-between h-14">
        <a href="/" class="text-xl font-bold text-sky-600 shrink-0">Mods4Hire</a>
        <div class="hidden md:flex items-center gap-6">
          <a href="/listings.html" class="text-sm text-gray-600 hover:text-sky-600 transition-colors">Browse Listings</a>
          <a href="/moderators.html" class="text-sm text-sky-600 font-medium">Moderators</a>
        </div>
        <div class="hidden md:flex items-center gap-3">
          <a href="/listings-new.html" class="bg-sky-600 hover:bg-sky-700 text-white text-sm px-4 py-2 rounded-lg font-medium transition-colors">+ Post a Listing</a>
          <div id="auth-links" class="flex items-center gap-3"></div>
        </div>
        <div class="flex md:hidden items-center gap-2">
          <a href="/listings-new.html" class="bg-sky-600 text-white text-xs px-3 py-1.5 rounded-lg font-medium">Post</a>
          <button id="menu-btn" aria-label="Open menu" class="p-2 rounded-lg text-gray-600 hover:bg-gray-100">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/></svg>
          </button>
        </div>
      </div>
      <div id="mobile-menu" class="hidden md:hidden border-t border-gray-100 py-3 space-y-0.5 pb-4">
        <a href="/listings.html" class="block px-3 py-2.5 text-sm text-gray-700 hover:text-sky-600 hover:bg-gray-50 rounded-lg">Browse Listings</a>
        <a href="/moderators.html" class="block px-3 py-2.5 text-sm text-sky-600 font-medium hover:bg-gray-50 rounded-lg">Moderators</a>
        <div id="mobile-auth-links" class="pt-2 border-t border-gray-100 mt-2"></div>
      </div>
    </div>
  </nav>
  <main class="max-w-6xl mx-auto px-4 py-10">
    <h1 class="text-2xl font-bold text-gray-900 mb-6">Browse Moderators</h1>
    <div id="mods-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">
      <p class="text-gray-400 text-sm">Loading…</p>
    </div>
  </main>
  <script>
    document.getElementById('menu-btn')?.addEventListener('click', () => document.getElementById('mobile-menu').classList.toggle('hidden'));
  </script>
  <script type="module">
    import { supabase, escapeHtml } from '/src/js/supabase.js';
    import { updateNavAuth } from '/src/js/auth.js';

    updateNavAuth();
    const { data: mods } = await supabase
      .from('profiles')
      .select('id, username, rating_avg, rating_count, bio, moderator_profiles(platforms, hours_per_week)')
      .in('role', ['moderator','both'])
      .order('rating_avg', { ascending: false })
      .limit(24);

    const grid = document.getElementById('mods-grid');
    grid.innerHTML = '';
    if (!mods?.length) { grid.innerHTML = '<p class="text-gray-400 text-sm">No moderators yet.</p>'; }
    else mods.forEach(m => {
      const div = document.createElement('div');
      div.className = 'bg-white border border-gray-200 rounded-xl p-5 cursor-pointer hover:shadow-md transition';
      div.innerHTML = `
        <h3 class="font-semibold text-gray-900">${escapeHtml(m.username)}</h3>
        <p class="text-yellow-500 text-sm">⭐ ${m.rating_avg} <span class="text-gray-400">(${m.rating_count})</span></p>
        ${m.bio ? `<p class="text-gray-500 text-sm mt-1 line-clamp-2">${escapeHtml(m.bio)}</p>` : ''}
        <div class="flex flex-wrap gap-1 mt-2">${(m.moderator_profiles?.platforms||[]).map(p=>`<span class="text-xs bg-sky-50 text-sky-700 px-2 py-0.5 rounded">${escapeHtml(p)}</span>`).join('')}</div>
      `;
      div.addEventListener('click', () => { window.location.href = `/moderator.html?id=${m.id}`; });
      grid.appendChild(div);
    });
  </script>
</body>
</html>
