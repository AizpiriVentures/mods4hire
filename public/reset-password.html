<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Set New Password — Mods4Hire</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/src/css/styles.css" />
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center px-4 py-10">
  <div class="bg-white w-full max-w-md rounded-xl shadow-sm border border-gray-200 p-8">
    <a href="/" class="text-sky-600 font-bold text-xl block mb-6">Mods4Hire</a>

    <div id="loading-state" class="text-center py-6">
      <p class="text-gray-400 text-sm">Verifying reset link…</p>
    </div>

    <div id="form-state" class="hidden">
      <h1 class="text-2xl font-semibold text-gray-900 mb-2">Set new password</h1>
      <p class="text-sm text-gray-500 mb-6">Choose a strong password for your account.</p>
      <form id="reset-form" class="space-y-4">
        <input id="password" type="password" placeholder="New password (8+ characters)" required minlength="8" autocomplete="new-password"
          class="w-full border border-gray-300 rounded-lg px-4 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-sky-400" />
        <input id="confirm-password" type="password" placeholder="Confirm new password" required minlength="8" autocomplete="new-password"
          class="w-full border border-gray-300 rounded-lg px-4 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-sky-400" />
        <p id="error-msg" class="text-red-500 text-sm hidden"></p>
        <button type="submit" id="submit-btn"
          class="w-full bg-sky-600 text-white py-2 rounded-lg text-sm font-medium hover:bg-sky-700 transition">Update Password</button>
      </form>
    </div>

    <div id="error-state" class="hidden text-center py-6">
      <p class="text-red-500 text-sm mb-4">This reset link is invalid or has expired.</p>
      <a href="/forgot-password.html" class="text-sm text-sky-600 hover:underline">Request a new link</a>
    </div>
  </div>

  <script type="module">
    import { supabase } from '/src/js/supabase.js';
    import { setLoading } from '/src/js/supabase.js';

    supabase.auth.onAuthStateChange(async (event, session) => {
      if (event === 'PASSWORD_RECOVERY') {
        document.getElementById('loading-state').classList.add('hidden');
        document.getElementById('form-state').classList.remove('hidden');
      } else if (event === 'SIGNED_IN' && session) {
        // already have a valid session from a previous recovery — show form
        document.getElementById('loading-state').classList.add('hidden');
        document.getElementById('form-state').classList.remove('hidden');
      }
    });

    // Timeout: if no recovery event fires in 8s, show error
    setTimeout(() => {
      if (!document.getElementById('loading-state').classList.contains('hidden')) {
        document.getElementById('loading-state').classList.add('hidden');
        document.getElementById('error-state').classList.remove('hidden');
      }
    }, 8000);

    document.getElementById('reset-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('submit-btn');
      const errEl = document.getElementById('error-msg');
      errEl.classList.add('hidden');
      const pw = document.getElementById('password').value;
      const cpw = document.getElementById('confirm-password').value;
      if (pw !== cpw) {
        errEl.textContent = 'Passwords do not match.';
        errEl.classList.remove('hidden');
        return;
      }
      setLoading(btn, true);
      try {
        const { error } = await supabase.auth.updateUser({ password: pw });
        if (error) throw error;
        window.location.href = '/login.html?reset=1';
      } catch (err) {
        errEl.textContent = err.message;
        errEl.classList.remove('hidden');
      } finally {
        setLoading(btn, false);
      }
    });
  </script>
</body>
</html>
